services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api

  api:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.api
    env_file:
      - path: ./server/.env
        required: false
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://travel:travel@postgres:5432/travel
      - REDIS_URL=redis://redis:6379
      - EMBEDDING_MODEL=text-embedding-v3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: travel
      POSTGRES_DB: travel
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-pgvector/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
